<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>House of Shadows — Family Secrets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0b0a0d; }
  button:disabled { opacity: 0.6; }
  input[type=range] { accent-color: #c0293a; height: 4px; }
  @keyframes flicker { 0%, 100% { opacity: 1; } 45% { opacity: 0.85; } 50% { opacity: 1; } 72% { opacity: 0.92; } }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel (no build step needed — this file runs as-is in any browser) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Tone.js for the ambient horror soundscape -->
<script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

/* ---------------------------------------------------------
   DATA
--------------------------------------------------------- */

const KILLERS = [
  { id: "vigilante", name: "The Vigilante", desc: "Hunts not for pleasure, but for penance owed." },
  { id: "hitman", name: "The Hitman", desc: "Professional, patient, allergic to witnesses." },
  { id: "masked", name: "The Masked Killer", desc: "Someone in this house already trusts him." },
  { id: "serial", name: "The Serial Killer", desc: "Keeps a piece of everyone he's ever found." },
  { id: "cult", name: "The Cult Leader", desc: "Some in this family remember the ritual." },
];

const FAMILIES = [
  { id: "black", name: "House Black", hex: "#2b2b31" },
  { id: "white", name: "House Ashworth", hex: "#d8d3c4" },
  { id: "blue", name: "House Clark", hex: "#2f5f7a" },
  { id: "pink", name: "House Rosier", hex: "#b06a7c" },
  { id: "red", name: "House Walker", hex: "#7a2430" },
];

const FATHER_VARIANTS = {
  black: { secretTitle: "The Targeted", ability: "A murderer hunted by the Vigilante. Revealing his secret buys temporary Protection from capture until the next round.", twist: "protection" },
  white: { secretTitle: "The Concealer", ability: "Hides a severe, unspoken illness. If the Watcher stirs before he's found, he transforms into The Monster — beyond any killer's reach.", twist: "monster" },
  default: { secretTitle: "The Murderer", ability: "Evidence Disposal — if found by the Vigilante, he burns his tracks and escapes, stunning the killer for one move.", twist: "escape" },
};

const ROLES = {
  mother: { label: "Mother", secretTitle: "The Cultist", ability: "Ritual Protection — a high-ranking cult member. If the Cult Leader (or the Monster) finds her, she stalls her hunter for one move instead of being caught.", fatedWith: "cult", icon: "\u{1F319}" },
  father: { label: "Father", fatedWith: "vigilante", icon: "\u{1F525}" },
  daughter: { label: "Daughter", secretTitle: "The Adorer", ability: "Deceptive Trust — admires the Masked Killer. He may pass through her room unless she exposes him, stunning him for one move.", fatedWith: "masked", icon: "\u{1F441}\uFE0F" },
  son: { label: "Son", secretTitle: "The Informant", ability: "Global Alarm — leaks the family's location to police. If found by the Hitman, he escapes, stuns him, and relocates him to the Foyer.", fatedWith: "hitman", icon: "\u{1F4FB}" },
  elder: { label: "Elder", secretTitle: "The Thief", ability: "Locked Door — stole the safe key. If found by the Serial Killer, they lock the room, escaping and stunning him for one move.", fatedWith: "serial", icon: "\u{1F512}" },
};

const ROLE_ORDER = ["mother", "father", "daughter", "son", "elder"];

const TIMER_PRESETS = {
  quick: { hiding: 60, hunt: 90, analysis: 30, label: "Quick" },
  standard: { hiding: 90, hunt: 120, analysis: 45, label: "Standard" },
};
const WATCHER_PRESETS = { off: { label: "Off", perSecond: 0 }, rare: { label: "Rare", perSecond: 0.006 }, frequent: { label: "Frequent", perSecond: 0.02 } };

const ROOMS = [
  { id: "study", name: "Study", area: "study" },
  { id: "library", name: "Library", area: "library" },
  { id: "parlor", name: "Parlor", area: "parlor" },
  { id: "foyer", name: "Foyer", area: "foyer", hallway: true },
  { id: "observatory", name: "Observatory", area: "observatory" },
  { id: "cellar", name: "Cellar", area: "cellar" },
  { id: "conservatory", name: "Conservatory", area: "conservatory" },
];
const ADJ = {
  study: ["library", "parlor", "foyer"], library: ["study", "foyer", "observatory"],
  parlor: ["study", "foyer", "cellar"], foyer: ["study", "library", "parlor", "observatory", "cellar", "conservatory"],
  observatory: ["library", "foyer", "conservatory"], cellar: ["parlor", "foyer", "conservatory"], conservatory: ["foyer", "observatory", "cellar"],
};

const PROFILE_KEY = "houseOfShadows.profile";
const ICON_MONSTER = "\u{1F47B}";
const ICON_SKULL = "\u{1F480}";
const ICON_FOOT = "\u{1F463}";
const ICON_PIN = "\u{1F4CD}";

/* ---------------------------------------------------------
   LOCAL STORAGE (no backend — this is what makes it work
   as a single offline file instead of Claude's window.storage)
--------------------------------------------------------- */

function lsGet(key) { try { return localStorage.getItem(key); } catch (e) { return null; } }
function lsSet(key, val) { try { localStorage.setItem(key, val); } catch (e) {} }

/* ---------------------------------------------------------
   AUDIO
--------------------------------------------------------- */

const audio = {
  drone: null, heart: null, loop: null, started: false,
  async start(intensity) {
    try {
      if (this.started) { this.setIntensity(intensity); return; }
      await Tone.start();
      this.drone = new Tone.Oscillator(55, "sine").toDestination(); this.drone.volume.value = -40; this.drone.start();
      this.heart = new Tone.MembraneSynth({ envelope: { sustain: 0 } }).toDestination(); this.heart.volume.value = -50;
      this.loop = new Tone.Loop((t) => this.heart.triggerAttackRelease("C1", "8n", t), 2).start(0);
      Tone.Transport.start(); this.started = true; this.setIntensity(intensity);
    } catch (e) {}
  },
  setIntensity(intensity) {
    try { if (!this.started) return; const t = Math.max(0, Math.min(100, intensity)) / 100;
      if (this.drone) this.drone.volume.value = -40 + t * 26;
      if (this.heart) this.heart.volume.value = t > 0 ? -50 + t * 30 : -100;
      if (this.loop) this.loop.interval = 2.4 - t * 1.6;
    } catch (e) {}
  },
  stop() { try { if (this.loop) this.loop.stop(0); if (this.drone) this.drone.stop(); Tone.Transport.stop(); this.started = false; } catch (e) {} },
};

/* ---------------------------------------------------------
   HELPERS
--------------------------------------------------------- */

function fmt(s) { const m = Math.floor(s / 60).toString().padStart(2, "0"); const sec = Math.floor(s % 60).toString().padStart(2, "0"); return m + ":" + sec; }
function fatherVariant(familyId) { return FATHER_VARIANTS[familyId] || FATHER_VARIANTS.default; }
function iconFor(roleId) { return (ROLES[roleId] && ROLES[roleId].icon) || "\u2753"; }

function makeRoster(familyId, killerId) {
  return ROLE_ORDER.map((roleId) => {
    const role = ROLES[roleId];
    if (roleId === "father") {
      const v = fatherVariant(familyId);
      return { id: "father", roleId: "father", label: "Father", fatedWith: "vigilante", secretTitle: v.secretTitle, ability: v.ability, twist: v.twist,
        isFated: true, revealed: false, status: "hidden", room: "foyer" };
    }
    return { id: roleId, roleId, label: role.label, secretTitle: role.secretTitle, ability: role.ability, fatedWith: role.fatedWith,
      isFated: role.fatedWith === killerId, revealed: false, status: "hidden", room: "foyer" };
  });
}

/* ---------------------------------------------------------
   ATMOSPHERE / SHARED UI
--------------------------------------------------------- */

function Atmosphere({ intensity }) {
  const t = Math.max(0, Math.min(100, intensity == null ? 50 : intensity)) / 100;
  return <div style={{ position: "absolute", inset: 0, pointerEvents: "none", zIndex: 0,
    background: "radial-gradient(ellipse 80% 60% at 50% 0%, rgba(217,164,65," + (0.05 + t * 0.05) + "), transparent 60%), radial-gradient(ellipse 120% 80% at 50% 100%, rgba(139,30,43," + (0.06 + t * 0.09) + "), transparent 60%)",
    animation: "flicker " + (7 - t * 3) + "s ease-in-out infinite" }} />;
}
function SectionLabel({ children }) { return <div style={{ fontFamily: "'Cinzel', serif", fontSize: 10.5, letterSpacing: "0.18em", textTransform: "uppercase", color: "#8b8494", marginBottom: 10 }}>{children}</div>; }
function PhaseBar({ phase }) {
  const steps = [{ id: "hiding", label: "Hiding" }, { id: "hunt", label: "Hunt" }, { id: "analysis", label: "Analysis" }];
  return <div style={{ display: "flex", gap: 6, marginBottom: 18 }}>
    {steps.map((s) => { const active = s.id === phase; return (
      <div key={s.id} style={{ flex: 1 }}>
        <div style={{ height: 3, borderRadius: 2, background: active ? "#d9a441" : "rgba(154,161,181,0.25)", boxShadow: active ? "0 0 8px rgba(217,164,65,0.7)" : "none", transition: "all .4s ease" }} />
        <div style={{ fontFamily: "'Cinzel', serif", fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: active ? "#d9a441" : "#6c7284", marginTop: 6, textAlign: "center" }}>{s.label}</div>
      </div>); })}
  </div>;
}
function StatusPill({ status }) {
  const map = { hidden: { l: "Hiding", c: "#8b8494", b: "rgba(139,132,148,0.12)" }, caught: { l: "Found", c: "#c0293a", b: "rgba(192,41,58,0.12)" },
    escaped: { l: "Escaped", c: "#7fae6b", b: "rgba(127,174,107,0.12)" }, protected: { l: "Protected", c: "#d9a441", b: "rgba(217,164,65,0.14)" },
    monster: { l: "The Monster", c: "#c0293a", b: "rgba(192,41,58,0.18)" } };
  const s = map[status] || map.hidden;
  return <div style={{ fontFamily: "'Cinzel', serif", fontSize: 9.5, letterSpacing: "0.08em", textTransform: "uppercase", color: s.c, background: s.b, padding: "4px 8px", borderRadius: 20, flexShrink: 0 }}>{s.l}</div>;
}

/* ---------------------------------------------------------
   MANSION BOARD
--------------------------------------------------------- */

function Board({ roster, mode, onRoomTap, searchedRooms, killerRoom, killerStunned, activeRoom, reachable, familyHex }) {
  return (
    <div style={{ position: "relative" }}>
      <div style={{ display: "grid", gridTemplateAreas: '"study study library library" "parlor foyer foyer observatory" "cellar cellar conservatory conservatory"',
        gridTemplateColumns: "1fr 1fr 1fr 1fr", gridTemplateRows: "84px 84px 84px", gap: 4, borderRadius: 10, overflow: "hidden", border: "1px solid rgba(217,164,65,0.25)", background: "#0e0c11", padding: 4 }}>
        {ROOMS.map((room) => {
          const visibleToken = roster.find((c) => c.room === room.id && (mode === "place" || c.status === "caught" || ((c.status === "escaped" || c.status === "monster") && c._lastRoom === room.id)));
          const searched = searchedRooms[room.id];
          const isKillerHere = killerRoom === room.id && mode === "hunt";
          const isCurrent = activeRoom === room.id;
          const isReachable = reachable && reachable.includes(room.id);
          const dimmed = !isCurrent && !isReachable;
          const clickable = mode === "hunt" ? (isReachable && !killerStunned && searched !== "found") : isReachable;
          return (
            <div key={room.id} onClick={() => clickable && onRoomTap(room.id)} style={{
              gridArea: room.area, position: "relative",
              background: room.hallway ? "repeating-linear-gradient(45deg,#161219,#161219 8px,#191420 8px,#191420 16px)"
                : searched === "found" ? "linear-gradient(160deg,#2c1a1e,#1a1216)" : searched === "empty" ? "linear-gradient(160deg,#1c1a22,#141119)" : "linear-gradient(160deg,#211c26,#17141a)",
              border: isCurrent ? "1.5px solid #d9a441" : isReachable ? "1px solid rgba(217,164,65,0.4)" : "1px solid rgba(154,161,181,0.1)",
              borderRadius: 6, cursor: clickable ? "pointer" : "default", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              padding: 4, transition: "all .25s", opacity: dimmed ? 0.42 : 1,
              boxShadow: isKillerHere ? "0 0 14px rgba(192,41,58,0.5) inset" : isReachable && !isCurrent ? "0 0 8px rgba(217,164,65,0.15) inset" : "none" }}>
              <div style={{ fontFamily: "'Cinzel', serif", fontSize: 9.5, letterSpacing: "0.06em", textTransform: "uppercase", color: room.hallway ? "#4a4854" : "#9a94a8", textAlign: "center" }}>{room.name}</div>
              {isKillerHere && <span style={{ fontSize: 15, marginTop: 4 }}>{ICON_SKULL}</span>}
              {isCurrent && mode === "place" && <span style={{ fontSize: 12, marginTop: 4 }}>{ICON_FOOT}</span>}
              {visibleToken && <div style={{ marginTop: 4, width: 16, height: 16, borderRadius: "50%", background: visibleToken.status === "monster" ? "#3a1418" : visibleToken.isFated ? "#c0293a" : familyHex, border: "1.5px solid rgba(236,223,194,0.6)", boxShadow: "0 0 6px rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9 }}>
                {visibleToken.status === "monster" ? ICON_MONSTER : ""}</div>}
              {searched === "empty" && !room.hallway && <div style={{ fontFamily: "'Crimson Pro', serif", fontSize: 9, color: "#4a4854", marginTop: 2, fontStyle: "italic" }}>searched</div>}
            </div>
          );
        })}
      </div>
      {mode === "hunt" && killerStunned && <div style={{ position: "absolute", inset: 0, borderRadius: 10, background: "rgba(6,5,8,0.78)", display: "flex", alignItems: "center", justifyContent: "center", textAlign: "center", padding: 16 }}>
        <div style={{ fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontSize: 13, color: "#e0a5ac" }}>A fated secret was revealed.<br />The killer is stunned this move.</div></div>}
    </div>
  );
}

/* ---------------------------------------------------------
   MODALS
--------------------------------------------------------- */

function InfoCardShell({ eyebrow, character, footer, children }) {
  const icon = iconFor(character.roleId);
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, background: "rgba(6,5,8,0.82)", backdropFilter: "blur(3px)" }}>
      <div style={{ width: "100%", maxWidth: 360, borderRadius: 10, background: "linear-gradient(165deg, #efe3c7, #e0d2ac)", color: "#241f1a", padding: "26px 22px", border: "1px solid #b8a273", boxShadow: "0 20px 60px rgba(0,0,0,0.6)" }}>
        {eyebrow && <div style={{ textAlign: "center", fontFamily: "'Cinzel', serif", fontSize: 11, letterSpacing: "0.2em", textTransform: "uppercase", color: "#7a1a26", marginBottom: 4 }}>{eyebrow}</div>}
        <div style={{ display: "flex", justifyContent: "center", margin: "10px 0 6px" }}><div style={{ width: 54, height: 54, borderRadius: "50%", background: "#241f1a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>{icon}</div></div>
        <div style={{ textAlign: "center", fontFamily: "'Cinzel', serif", fontSize: 20, marginBottom: 2 }}>{character.label}</div>
        <div style={{ textAlign: "center", fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontSize: 14, color: "#6b5a3a", marginBottom: 14 }}>{character.secretTitle}</div>
        <p style={{ fontFamily: "'Crimson Pro', serif", fontSize: 15, lineHeight: 1.5, textAlign: "center", marginBottom: 14 }}>{character.ability}</p>
        {children}{footer}
      </div>
    </div>
  );
}
function FatedModal({ character, killer, onClose }) {
  if (!character) return null;
  return <InfoCardShell eyebrow="Fated Encounter" character={character}
    footer={<button onClick={onClose} style={{ width: "100%", fontFamily: "'Cinzel', serif", fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase", padding: "12px 0", borderRadius: 4, background: "#7a1a26", border: "1px solid #7a1a26", color: "#f2e6d8", cursor: "pointer" }}>Continue the Hunt</button>}>
    <div style={{ fontFamily: "'Crimson Pro', serif", fontSize: 12.5, textAlign: "center", color: "#6b5a3a" }}>vs {killer.name}</div>
  </InfoCardShell>;
}
function WatcherModal({ open, onClose }) {
  if (!open) return null;
  return <div style={{ position: "fixed", inset: 0, zIndex: 55, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, background: "rgba(6,5,8,0.88)" }}>
    <div style={{ textAlign: "center", maxWidth: 320 }}>
      <div style={{ fontSize: 36, marginBottom: 16 }}>{ICON_MONSTER}</div>
      <div style={{ fontFamily: "'Cinzel', serif", fontSize: 20, color: "#ecdfc2", marginBottom: 10 }}>The Watcher Stirs</div>
      <p style={{ fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontSize: 14, color: "#8b8494", marginBottom: 22, lineHeight: 1.5 }}>Something else is awake in this house tonight.</p>
      <button onClick={onClose} style={{ fontFamily: "'Cinzel', serif", fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", padding: "12px 26px", borderRadius: 6, background: "linear-gradient(180deg,#c0293a,#7a1a26)", color: "#f2e6d8", border: "1px solid rgba(217,164,65,0.3)", cursor: "pointer" }}>Continue</button>
    </div></div>;
}
function AnalysisWheel({ roster, onResult, spinning, setSpinning }) {
  const [rotation, setRotation] = useState(0);
  const available = roster.filter((c) => c.status === "hidden");
  const spin = () => {
    if (spinning || available.length === 0) return;
    setSpinning(true);
    const idx = Math.floor(Math.random() * available.length);
    const chosen = available[idx];
    const segAngle = 360 / roster.length;
    const targetIndex = roster.findIndex((r) => r.id === chosen.id);
    const finalAngle = 5 * 360 + (360 - targetIndex * segAngle - segAngle / 2);
    setRotation((p) => p + finalAngle);
    setTimeout(() => { setSpinning(false); onResult(chosen.id); }, 2600);
  };
  const segAngle = 360 / roster.length;
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 18 }}>
      <div style={{ position: "relative", width: 200, height: 200 }}>
        <div style={{ position: "absolute", top: -10, left: "50%", transform: "translateX(-50%)", width: 0, height: 0, zIndex: 3, borderLeft: "9px solid transparent", borderRight: "9px solid transparent", borderTop: "16px solid #d9a441", filter: "drop-shadow(0 0 4px rgba(217,164,65,0.6))" }} />
        <div style={{ width: "100%", height: "100%", borderRadius: "50%", border: "3px solid #3a3340", position: "relative", overflow: "hidden", transform: "rotate(" + rotation + "deg)", transition: spinning ? "transform 2.5s cubic-bezier(0.15,0.85,0.25,1)" : "none", boxShadow: "0 0 0 6px #17141a, 0 0 30px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.5)" }}>
          {roster.map((c, i) => { const angle = i * segAngle; const isUsed = c.status !== "hidden";
            return <div key={c.id} style={{ position: "absolute", inset: 0, transform: "rotate(" + angle + "deg)", clipPath: "polygon(50% 50%, " + (50 + 50 * Math.tan((segAngle * Math.PI) / 360)) + "% 0%, 0% 0%)" }}>
              <div style={{ position: "absolute", inset: 0, background: isUsed ? "linear-gradient(160deg, #201c25, #16131a)" : i % 2 === 0 ? "linear-gradient(160deg, #2c2632, #1c1721)" : "linear-gradient(160deg, #241f2a, #17131c)" }} /></div>; })}
          {roster.map((c, i) => { const angle = i * segAngle + segAngle / 2 - 90; const r = 66;
            const x = 100 + r * Math.cos((angle * Math.PI) / 180); const y = 100 + r * Math.sin((angle * Math.PI) / 180); const isUsed = c.status !== "hidden";
            return <div key={c.id + "icon"} style={{ position: "absolute", left: x - 11, top: y - 11, fontSize: 18, opacity: isUsed ? 0.3 : 1, filter: isUsed ? "grayscale(1)" : "none" }}>{iconFor(c.roleId)}</div>; })}
          <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", width: 32, height: 32, borderRadius: "50%", background: "radial-gradient(circle, #d9a441, #8a5d1e)", boxShadow: "0 0 14px rgba(217,164,65,0.6)" }} />
        </div>
      </div>
      <button onClick={spin} disabled={spinning || available.length === 0} style={{
        fontFamily: "'Cinzel', serif", letterSpacing: "0.12em", textTransform: "uppercase", fontSize: 13, padding: "12px 28px", borderRadius: 4,
        background: spinning || available.length === 0 ? "#2a2530" : "linear-gradient(180deg,#c0293a,#7a1a26)",
        color: spinning || available.length === 0 ? "#5c5866" : "#f2e6d8", border: "1px solid rgba(217,164,65,0.3)",
        cursor: spinning || available.length === 0 ? "default" : "pointer", transition: "all .2s" }}>
        {available.length === 0 ? "All secrets settled" : spinning ? "Turning\u2026" : "Turn the Wheel"}
      </button>
    </div>
  );
}
function SecretModal({ character, killer, onReveal, onSilence }) {
  if (!character) return null;
  const revealLabel = character.twist === "protection" ? "Reveal for Protection" : "Reveal Secret";
  return <InfoCardShell character={character} eyebrow="The Wheel Has Chosen"
    footer={
      <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
        <button onClick={onSilence} style={{ flex: 1, fontFamily: "'Cinzel', serif", fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 0", borderRadius: 4, background: "transparent", border: "1px solid #8a6f2e", color: "#5a4a24", cursor: "pointer" }}>Maintain Silence</button>
        <button onClick={onReveal} style={{ flex: 1, fontFamily: "'Cinzel', serif", fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 0", borderRadius: 4, background: "#7a1a26", border: "1px solid #7a1a26", color: "#f2e6d8", cursor: "pointer" }}>{revealLabel}</button>
      </div>
    }>
    {character.isFated && <div style={{ fontFamily: "'Crimson Pro', serif", fontSize: 13, textAlign: "center", color: "#7a1a26", fontWeight: 600, marginBottom: 4 }}>Fated against {killer.name} — revealing this secret carries extra weight tonight.</div>}
  </InfoCardShell>;
}
function PassDevice({ target, onContinue }) {
  const copy = target === "killer"
    ? { title: "Pass the Device", body: "Hand the phone to whoever is playing the killer. Family, look away.", cta: "I am the killer" }
    : { title: "Pass the Device", body: "Hand the phone to whoever is running the Analysis Phase.", cta: "I'll take it from here" };
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 60, display: "flex", alignItems: "center", justifyContent: "center", padding: 24, background: "#0b0a0d" }}>
      <div style={{ textAlign: "center", maxWidth: 320 }}>
        <div style={{ fontSize: 34, marginBottom: 18 }}>{ICON_MONSTER}</div>
        <div style={{ fontFamily: "'Cinzel', serif", fontSize: 20, color: "#ecdfc2", marginBottom: 10 }}>{copy.title}</div>
        <p style={{ fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontSize: 14, color: "#8b8494", marginBottom: 26, lineHeight: 1.5 }}>{copy.body}</p>
        <button onClick={onContinue} style={{ fontFamily: "'Cinzel', serif", fontSize: 13, letterSpacing: "0.1em", textTransform: "uppercase", padding: "13px 28px", borderRadius: 6, background: "linear-gradient(180deg,#c0293a,#7a1a26)", color: "#f2e6d8", border: "1px solid rgba(217,164,65,0.3)", cursor: "pointer" }}>{copy.cta}</button>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   SETUP + PROFILE + SETTINGS
--------------------------------------------------------- */

function Setup({ onStart }) {
  const [killerId, setKillerId] = useState(null);
  const [familyId, setFamilyId] = useState(null);
  const [preset, setPreset] = useState("standard");
  const [name, setName] = useState("");
  const [horrorIntensity, setHorrorIntensity] = useState(50);
  const [watcherPresence, setWatcherPresence] = useState("rare");
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const raw = lsGet(PROFILE_KEY);
    if (raw) { try {
      const p = JSON.parse(raw);
      if (p.name) setName(p.name);
      if (typeof p.horrorIntensity === "number") setHorrorIntensity(p.horrorIntensity);
      if (p.watcherPresence) setWatcherPresence(p.watcherPresence);
      if (p.familyId) setFamilyId(p.familyId);
    } catch (e) {} }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    lsSet(PROFILE_KEY, JSON.stringify({ name, horrorIntensity, watcherPresence, familyId }));
  }, [name, horrorIntensity, watcherPresence, familyId, loaded]);

  return (
    <div style={{ position: "relative", zIndex: 1, padding: "28px 20px 40px" }}>
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <div style={{ fontFamily: "'Cinzel', serif", fontSize: 11, letterSpacing: "0.3em", color: "#c0293a", marginBottom: 6 }}>FAMILY SECRETS</div>
        <h1 style={{ fontFamily: "'Cinzel', serif", fontSize: 28, color: "#ecdfc2", margin: 0, letterSpacing: "0.03em" }}>House of Shadows</h1>
        <div style={{ fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontSize: 13, color: "#8b8494", marginTop: 6 }}>Local pass-and-play — one device, everyone at the table</div>
      </div>

      <SectionLabel>Your profile</SectionLabel>
      <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Name your character" style={{
        width: "100%", background: "#161219", border: "1px solid rgba(154,161,181,0.15)", borderRadius: 8, padding: "12px 14px",
        color: "#ecdfc2", fontFamily: "'Crimson Pro', serif", fontSize: 14, outline: "none", marginBottom: 26 }} />

      <SectionLabel>Choose the killer</SectionLabel>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 26 }}>
        {KILLERS.map((k) => {
          const active = killerId === k.id;
          return (
            <button key={k.id} onClick={() => setKillerId(k.id)} style={{
              textAlign: "left", padding: "12px 12px", borderRadius: 8, cursor: "pointer",
              background: active ? "linear-gradient(160deg,#2c1a1e,#1a1216)" : "#181419",
              border: active ? "1px solid #c0293a" : "1px solid rgba(154,161,181,0.15)",
              boxShadow: active ? "0 0 14px rgba(192,41,58,0.25)" : "none", transition: "all .2s",
            }}>
              <div style={{ fontFamily: "'Cinzel', serif", fontSize: 13.5, color: active ? "#f2e6d8" : "#c9c3d4" }}>{k.name}</div>
              <div style={{ fontFamily: "'Crimson Pro', serif", fontSize: 11.5, color: "#8b8494", marginTop: 3, lineHeight: 1.3 }}>{k.desc}</div>
            </button>
          );
        })}
      </div>

      <SectionLabel>Choose your family</SectionLabel>
      <div style={{ display: "flex", gap: 10, marginBottom: 10, flexWrap: "wrap" }}>
        {FAMILIES.map((f) => {
          const active = familyId === f.id;
          return (
            <button key={f.id} onClick={() => setFamilyId(f.id)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, background: "transparent", border: "none", cursor: "pointer", width: 62 }}>
              <div style={{ width: 40, height: 40, borderRadius: "50%", background: f.hex, border: active ? "3px solid #d9a441" : "3px solid transparent", boxShadow: active ? "0 0 12px rgba(217,164,65,0.5)" : "0 2px 6px rgba(0,0,0,0.4)", transition: "all .2s" }} />
              <div style={{ fontFamily: "'Crimson Pro', serif", fontSize: 10.5, color: active ? "#ecdfc2" : "#6c7284", textAlign: "center" }}>{f.name}</div>
            </button>
          );
        })}
      </div>
      {familyId ? (
        <div style={{ fontFamily: "'Crimson Pro', serif", fontSize: 11.5, fontStyle: "italic", color: "#6c7284", marginBottom: 26 }}>
          {familyId === "white" && "Ashworth Fathers conceal something worse than murder."}
          {familyId === "black" && "House Black's father is already being hunted."}
          {familyId !== "white" && familyId !== "black" && "A standard household secret set."}
        </div>
      ) : <div style={{ marginBottom: 26 }} />}

      <SectionLabel>Phase length</SectionLabel>
      <div style={{ display: "flex", gap: 10, marginBottom: 22 }}>
        {Object.entries(TIMER_PRESETS).map(([key, p]) => {
          const active = preset === key;
          return (
            <button key={key} onClick={() => setPreset(key)} style={{
              flex: 1, padding: "10px 0", borderRadius: 6, cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 12, letterSpacing: "0.05em",
              background: active ? "#241f2a" : "transparent", border: active ? "1px solid #d9a441" : "1px solid rgba(154,161,181,0.2)", color: active ? "#d9a441" : "#8b8494",
            }}>{p.label}<div style={{ fontSize: 9.5, color: "#6c7284", marginTop: 2 }}>{p.hiding}s \u00b7 {p.hunt}s \u00b7 {p.analysis}s</div></button>
          );
        })}
      </div>

      <SectionLabel>Horror intensity</SectionLabel>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 22 }}>
        <span style={{ fontSize: 14 }}>\u{1F507}</span>
        <input type="range" min={0} max={100} value={horrorIntensity} onChange={(e) => setHorrorIntensity(Number(e.target.value))} style={{ flex: 1 }} />
        <span style={{ fontSize: 14 }}>\u{1F50A}</span>
      </div>

      <SectionLabel>Watcher presence</SectionLabel>
      <div style={{ display: "flex", gap: 10, marginBottom: 8 }}>
        {Object.entries(WATCHER_PRESETS).map(([key, w]) => {
          const active = watcherPresence === key;
          return (
            <button key={key} onClick={() => setWatcherPresence(key)} style={{
              flex: 1, padding: "9px 0", borderRadius: 6, cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 11.5, letterSpacing: "0.05em",
              background: active ? "#241f2a" : "transparent", border: active ? "1px solid #d9a441" : "1px solid rgba(154,161,181,0.2)", color: active ? "#d9a441" : "#8b8494",
            }}>{w.label}</button>
          );
        })}
      </div>
      <div style={{ fontFamily: "'Crimson Pro', serif", fontSize: 11, fontStyle: "italic", color: "#565162", marginBottom: 26 }}>
        How often something else stirs in the house during the hunt.
      </div>

      <button disabled={!killerId || !familyId} onClick={() => onStart({ killerId, familyId, preset, horrorIntensity, watcherPresence, name })} style={{
        width: "100%", padding: "15px 0", borderRadius: 6, fontFamily: "'Cinzel', serif", fontSize: 14, letterSpacing: "0.12em", textTransform: "uppercase",
        background: killerId && familyId ? "linear-gradient(180deg,#c0293a,#7a1a26)" : "#221e28", color: killerId && familyId ? "#f2e6d8" : "#54505f",
        border: "1px solid rgba(217,164,65,0.25)", cursor: killerId && familyId ? "pointer" : "default", boxShadow: killerId && familyId ? "0 6px 20px rgba(192,41,58,0.3)" : "none",
      }}>Enter the House</button>
    </div>
  );
}

/* ---------------------------------------------------------
   GAME
--------------------------------------------------------- */

function Game({ config, onReset }) {
  const { killerId, familyId, preset, horrorIntensity, watcherPresence, name } = config;
  const killer = KILLERS.find((k) => k.id === killerId);
  const family = FAMILIES.find((f) => f.id === familyId);
  const durations = TIMER_PRESETS[preset];
  const watcherRate = WATCHER_PRESETS[watcherPresence].perSecond;

  const [phase, setPhase] = useState("hiding");
  const [round, setRound] = useState(1);
  const [timeLeft, setTimeLeft] = useState(durations.hiding);
  const [running, setRunning] = useState(true);
  const [roster, setRoster] = useState(() => makeRoster(familyId, killerId));
  const [log, setLog] = useState(["Round 1. " + (name || "The family") + " starts in the foyer."]);
  const [wheelChar, setWheelChar] = useState(null);
  const [spinning, setSpinning] = useState(false);
  const [activeId, setActiveId] = useState(null);
  const [searchedRooms, setSearchedRooms] = useState({});
  const [killerRoom, setKillerRoom] = useState("foyer");
  const [killerStunned, setKillerStunned] = useState(false);
  const [fatedResult, setFatedResult] = useState(null);
  const [watcherModal, setWatcherModal] = useState(false);
  const [watcherFiredThisHunt, setWatcherFiredThisHunt] = useState(false);
  const [passState, setPassState] = useState(null);
  const [muted, setMuted] = useState(false);

  const addLog = useCallback((msg) => setLog((l) => [msg, ...l].slice(0, 8)), []);

  useEffect(() => { audio.start(horrorIntensity); return () => audio.stop(); }, []);
  useEffect(() => { audio.setIntensity(muted ? 0 : horrorIntensity); }, [horrorIntensity, muted]);

  useEffect(() => {
    if (!running) return;
    if (timeLeft <= 0) { advancePhase(); return; }
    const t = setTimeout(() => setTimeLeft((s) => s - 1), 1000);
    return () => clearTimeout(t);
    // eslint-disable-next-line
  }, [timeLeft, running]);

  useEffect(() => {
    if (phase !== "hunt" || !running || watcherFiredThisHunt || watcherRate === 0) return;
    if (Math.random() < watcherRate) {
      setWatcherFiredThisHunt(true);
      setWatcherModal(true);
      addLog("The Watcher stirs somewhere in the house.");
      if (familyId === "white") {
        setRoster((r) => r.map((c) => (c.id === "father" && c.status === "hidden") ? { ...c, status: "monster", _lastRoom: c.room } : c));
      }
    }
    // eslint-disable-next-line
  }, [timeLeft, phase, running]);

  function advancePhase() {
    if (phase === "hiding") {
      setPhase("hunt"); setTimeLeft(durations.hunt); setRunning(false); setPassState("killer");
      addLog("Hiding ends. " + killer.name + " steps out of the foyer.");
    } else if (phase === "hunt") {
      setPhase("analysis"); setTimeLeft(durations.analysis); setRunning(false); setPassState("analysis");
      addLog("The hunt stalls. The Analysis Wheel turns.");
    } else if (phase === "analysis") {
      const nextRound = round + 1;
      setRound(nextRound); setPhase("hiding"); setTimeLeft(durations.hiding);
      setSearchedRooms({}); setKillerRoom("foyer"); setKillerStunned(false); setWatcherFiredThisHunt(false);
      setRoster((r) => r.map((c) => (c.status === "hidden" || c.status === "protected") ? { ...c, status: "hidden", room: "foyer" } : c));
      addLog("Round " + nextRound + " begins. Remaining family return to the foyer.");
    }
  }

  function skipPhase() { setRunning(false); advancePhase(); }
  function dismissPass() { setPassState(null); setRunning(true); }

  const activeHunted = roster.filter((c) => c.status === "hidden" || c.status === "protected");
  const remaining = roster.filter((c) => c.status === "hidden");
  const gameOver = activeHunted.length === 0;

  useEffect(() => {
    if (phase === "hiding" && !activeId && remaining.length) setActiveId(remaining[0].id);
    // eslint-disable-next-line
  }, [phase, roster]);

  const activeChar = roster.find((c) => c.id === activeId);

  function occupiedRoomIds(excludeId) {
    return roster.filter((c) => c.status === "hidden" && c.room !== "foyer" && c.id !== excludeId).map((c) => c.room);
  }

  function handleRoomTapPlace(roomId) {
    if (!activeChar) return;
    if (!ADJ[activeChar.room].includes(roomId)) return;
    if (occupiedRoomIds(activeChar.id).includes(roomId)) return;
    setRoster((r) => r.map((c) => (c.id === activeChar.id ? { ...c, room: roomId } : c)));
  }

  function handleRoomTapHunt(roomId) {
    if (killerStunned) return;
    if (!ADJ[killerRoom].includes(roomId)) return;
    setKillerRoom(roomId);
    const occupant = roster.find((c) => c.room === roomId && c.status === "hidden");
    if (!occupant) {
      setSearchedRooms((s) => ({ ...s, [roomId]: "empty" }));
      addLog(killer.name + " moves into the " + ROOMS.find((r) => r.id === roomId).name + " \u2014 nothing there.");
      return;
    }
    if (occupant.isFated) {
      setRoster((r) => r.map((c) => (c.id === occupant.id ? { ...c, status: "escaped", _lastRoom: roomId } : c)));
      setSearchedRooms((s) => ({ ...s, [roomId]: "found" }));
      setKillerStunned(true); setFatedResult(occupant);
      addLog(killer.name + " finds " + occupant.label + " \u2014 the fated secret triggers. " + occupant.label + " escapes.");
      if (occupant.id === "son") { setTimeout(() => setKillerRoom("foyer"), 500); addLog("The alarm sounds \u2014 " + killer.name + " is relocated to the Foyer."); }
      setTimeout(() => setKillerStunned(false), 3200);
    } else {
      setRoster((r) => r.map((c) => (c.id === occupant.id ? { ...c, status: "caught", _lastRoom: roomId } : c)));
      setSearchedRooms((s) => ({ ...s, [roomId]: "found" }));
      addLog(killer.name + " finds " + occupant.label + ". Their secret dies with them.");
    }
  }

  function handleWheelResult(id) { setWheelChar(roster.find((c) => c.id === id)); }
  function revealSecret() {
    const isProtection = wheelChar.twist === "protection";
    setRoster((r) => r.map((c) => (c.id === wheelChar.id ? { ...c, revealed: true, status: isProtection ? "protected" : "escaped", _lastRoom: c.room } : c)));
    addLog(isProtection ? (wheelChar.label + " reveals their secret and gains Protection until next round.") : (wheelChar.label + " reveals their secret: " + wheelChar.secretTitle + "."));
    setWheelChar(null);
  }
  function silence() { addLog(wheelChar.label + " chooses to stay silent."); setWheelChar(null); }

  if (gameOver) {
    const survivors = roster.filter((c) => c.status === "escaped" || c.status === "monster").length;
    return (
      <div style={{ position: "relative", zIndex: 1, padding: "60px 24px", textAlign: "center" }}>
        <div style={{ fontSize: 40, marginBottom: 16 }}>{ICON_SKULL}</div>
        <h2 style={{ fontFamily: "'Cinzel', serif", fontSize: 24, color: "#ecdfc2" }}>The House Falls Silent</h2>
        <p style={{ fontFamily: "'Crimson Pro', serif", fontSize: 15, color: "#8b8494", margin: "12px 0 28px" }}>{survivors} of 5 family members escaped {killer.name}.</p>
        <button onClick={onReset} style={{ fontFamily: "'Cinzel', serif", fontSize: 13, letterSpacing: "0.1em", textTransform: "uppercase", padding: "13px 30px", borderRadius: 6, background: "linear-gradient(180deg,#c0293a,#7a1a26)", color: "#f2e6d8", border: "1px solid rgba(217,164,65,0.3)", cursor: "pointer" }}>New Night</button>
      </div>
    );
  }

  const familyHex = family.hex;
  const placeReachable = activeChar ? ADJ[activeChar.room] : [];
  const huntReachable = ADJ[killerRoom];

  return (
    <div style={{ position: "relative", zIndex: 1, padding: "22px 18px 40px" }}>
      {passState && <PassDevice target={passState} onContinue={dismissPass} />}
      <SecretModal character={wheelChar} killer={killer} onReveal={revealSecret} onSilence={silence} />
      <FatedModal character={fatedResult} killer={killer} onClose={() => setFatedResult(null)} />
      <WatcherModal open={watcherModal} onClose={() => setWatcherModal(false)} />

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style={{ fontFamily: "'Cinzel', serif", fontSize: 11, letterSpacing: "0.15em", color: "#8b8494" }}>ROUND {round}</div>
        <div style={{ fontFamily: "'Crimson Pro', serif", fontSize: 12, fontStyle: "italic", color: "#c0293a" }}>{killer.name}</div>
        <button onClick={() => setMuted((m) => !m)} style={{ background: "transparent", border: "none", cursor: "pointer", fontSize: 15 }}>{muted ? "\u{1F507}" : "\u{1F50A}"}</button>
      </div>
      {name && <div style={{ fontFamily: "'Crimson Pro', serif", fontSize: 10.5, color: "#565162", marginBottom: 10 }}>Playing as {name}</div>}

      <PhaseBar phase={phase} />

      <div style={{ textAlign: "center", margin: "14px 0 20px" }}>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 48, color: "#ecdfc2", letterSpacing: "0.02em", textShadow: "0 0 20px rgba(217,164,65,0.25)" }}>{fmt(timeLeft)}</div>
        <div style={{ fontFamily: "'Crimson Pro', serif", fontSize: 13, color: "#6c7284", fontStyle: "italic", marginTop: 2 }}>
          {phase === "hiding" && "Pick a chip, then step them room to room \u2014 only doorways glow."}
          {phase === "hunt" && "The killer can only step into a glowing, adjacent room."}
          {phase === "analysis" && "The wheel decides who speaks next."}
        </div>
      </div>

      <div style={{ display: "flex", gap: 10, justifyContent: "center", marginBottom: 20 }}>
        <button onClick={() => setRunning((r) => !r)} style={iconBtnStyle}>{running ? "\u23F8" : "\u25B6"} {running ? "Pause" : "Resume"}</button>
        <button onClick={skipPhase} style={iconBtnStyle}>\u25B8 Skip</button>
      </div>

      {phase === "hiding" && (
        <div style={{ marginBottom: 22 }}>
          <SectionLabel>Family chips</SectionLabel>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
            {remaining.map((c) => {
              const settled = c.room !== "foyer"; const selected = activeId === c.id;
              return (
                <button key={c.id} onClick={() => setActiveId(c.id)} style={{
                  display: "flex", alignItems: "center", gap: 6, padding: "8px 12px", borderRadius: 20,
                  background: selected ? "#241820" : settled ? "#161219" : "#181419",
                  border: selected ? "1px solid #c0293a" : "1px solid rgba(154,161,181,0.18)",
                  color: settled ? "#9a94a8" : "#c9c3d4", cursor: "pointer", fontFamily: "'Crimson Pro', serif", fontSize: 12,
                }}><span style={{ fontSize: 13 }}>{iconFor(c.roleId)}</span> {c.label} {settled && "\u2713"}</button>
              );
            })}
          </div>
          <Board roster={roster} mode="place" onRoomTap={handleRoomTapPlace} searchedRooms={{}} killerRoom={null} killerStunned={false} activeRoom={activeChar && activeChar.room} reachable={placeReachable} familyHex={familyHex} />
        </div>
      )}

      {phase === "hunt" && (
        <div style={{ marginBottom: 22 }}>
          <SectionLabel>The mansion</SectionLabel>
          <Board roster={roster} mode="hunt" onRoomTap={handleRoomTapHunt} searchedRooms={searchedRooms} killerRoom={killerRoom} killerStunned={killerStunned} activeRoom={killerRoom} reachable={huntReachable} familyHex={familyHex} />
        </div>
      )}

      {phase === "analysis" && (
        <div style={{ marginBottom: 8 }}>
          <SectionLabel>Analysis wheel</SectionLabel>
          <AnalysisWheel roster={remaining.length ? remaining : roster} onResult={handleWheelResult} spinning={spinning} setSpinning={setSpinning} />
        </div>
      )}

      <SectionLabel>The family</SectionLabel>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 24 }}>
        {roster.map((c) => (
          <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", borderRadius: 8, background: "#161219", border: c.isFated ? "1px solid rgba(192,41,58,0.4)" : "1px solid rgba(154,161,181,0.1)", opacity: c.status === "caught" ? 0.4 : 1 }}>
            <div style={{ width: 34, height: 34, borderRadius: "50%", flexShrink: 0, background: c.status === "monster" ? "#3a1418" : c.isFated ? "#3a1418" : "#221e28", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>
              {c.status === "monster" ? ICON_MONSTER : iconFor(c.roleId)}
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: "'Cinzel', serif", fontSize: 12.5, color: "#ecdfc2" }}>{c.label}</div>
              <div style={{ fontFamily: "'Crimson Pro', serif", fontSize: 11, color: "#6c7284", display: "flex", alignItems: "center", gap: 4 }}>
                {c.revealed ? c.secretTitle : "Secret unknown"}
                {c.status === "hidden" && c.room !== "foyer" && <span>{ICON_PIN} {ROOMS.find((r) => r.id === c.room).name}</span>}
              </div>
            </div>
            <StatusPill status={c.status} />
          </div>
        ))}
      </div>

      <SectionLabel>Log</SectionLabel>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {log.map((entry, i) => <div key={i} style={{ fontFamily: "'Crimson Pro', serif", fontSize: 12, fontStyle: "italic", color: i === 0 ? "#c9c3d4" : "#565162" }}>{entry}</div>)}
      </div>
    </div>
  );
}

const iconBtnStyle = { display: "flex", alignItems: "center", gap: 6, padding: "9px 16px", borderRadius: 20, background: "#181419", border: "1px solid rgba(154,161,181,0.2)", color: "#c9c3d4", fontFamily: "'Crimson Pro', serif", fontSize: 12, cursor: "pointer" };

/* ---------------------------------------------------------
   ROOT
--------------------------------------------------------- */

function App() {
  const [config, setConfig] = useState(null);
  return (
    <div style={{ minHeight: "100vh", width: "100%", position: "relative", background: "radial-gradient(ellipse at 50% -10%, #1c1620 0%, #0b0a0d 55%)", color: "#c9c3d4", overflow: "hidden" }}>
      <Atmosphere intensity={config ? config.horrorIntensity : 50} />
      <div style={{ maxWidth: 420, margin: "0 auto", position: "relative" }}>
        {!config ? <Setup onStart={setConfig} /> : <Game config={config} onReset={() => setConfig(null)} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
