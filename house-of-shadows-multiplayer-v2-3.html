     so there's no multi-megabyte in-browser compiler to wait on) -->

<script>
const { useState, useEffect, useCallback, useRef } = React;
const html = htm.bind(React.createElement);
const db = window.__db;

/* ---------------------------------------------------------
   DATA
--------------------------------------------------------- */
const KILLERS = [
  { id: "vigilante", name: "The Vigilante", desc: "Hunts not for pleasure, but for penance owed." },
  { id: "hitman", name: "The Hitman", desc: "Professional, patient, allergic to witnesses." },
  { id: "masked", name: "The Masked Killer", desc: "Someone in this house already trusts him." },
  { id: "serial", name: "The Serial Killer", desc: "Keeps a piece of everyone he's ever found." },
  { id: "cult", name: "The Cult Leader", desc: "Some in this family remember the ritual." },
];
const FAMILIES = [
  { id: "black", name: "House Black", hex: "#2b2b31" },
  { id: "white", name: "House Ashworth", hex: "#d8d3c4" },
  { id: "blue", name: "House Clark", hex: "#2f5f7a" },
  { id: "pink", name: "House Rosier", hex: "#b06a7c" },
  { id: "red", name: "House Walker", hex: "#7a2430" },
];
const FATHER_VARIANTS = {
  black: { secretTitle: "The Targeted", ability: "A murderer hunted by the Vigilante. Revealing his secret buys temporary Protection from capture until the next round.", twist: "protection" },
  white: { secretTitle: "The Concealer", ability: "Hides a severe, unspoken illness. If the Watcher stirs before he's found, he transforms into The Monster — beyond any killer's reach.", twist: "monster" },
  default: { secretTitle: "The Murderer", ability: "Evidence Disposal — if found by the Vigilante, he burns his tracks and escapes, stunning the killer for one move.", twist: "escape" },
};
const ROLES = {
  mother: { label: "Mother", secretTitle: "The Cultist", ability: "Ritual Protection — a high-ranking cult member. If the Cult Leader (or the Monster) finds her, she stalls her hunter for one move instead of being caught.", fatedWith: "cult", icon: "\u{1F319}" },
  father: { label: "Father", fatedWith: "vigilante", icon: "\u{1F525}" },
  daughter: { label: "Daughter", secretTitle: "The Adorer", ability: "Deceptive Trust — admires the Masked Killer. He may pass through her room unless she exposes him, stunning him for one move.", fatedWith: "masked", icon: "\u{1F441}\uFE0F" },
  son: { label: "Son", secretTitle: "The Informant", ability: "Global Alarm — leaks the family's location to police. If found by the Hitman, he escapes, stuns him, and relocates him to the Foyer.", fatedWith: "hitman", icon: "\u{1F4FB}" },
  elder: { label: "Elder", secretTitle: "The Thief", ability: "Locked Door — stole the safe key. If found by the Serial Killer, they lock the room, escaping and stunning him for one move.", fatedWith: "serial", icon: "\u{1F512}" },
};
const ROLE_ORDER = ["mother", "father", "daughter", "son", "elder"];
const SLOT_ORDER = ["killer", ...ROLE_ORDER];
const TIMER_PRESETS = { quick: { hiding: 60, hunt: 90, analysis: 30, label: "Quick" }, standard: { hiding: 90, hunt: 120, analysis: 45, label: "Standard" } };
const WATCHER_PRESETS = { off: { label: "Off", perSecond: 0 }, rare: { label: "Rare", perSecond: 0.006 }, frequent: { label: "Frequent", perSecond: 0.02 } };
const ROOMS = [
  { id: "study", name: "Study", area: "study" }, { id: "library", name: "Library", area: "library" },
  { id: "parlor", name: "Parlor", area: "parlor" }, { id: "foyer", name: "Foyer", area: "foyer", hallway: true },
  { id: "observatory", name: "Observatory", area: "observatory" }, { id: "cellar", name: "Cellar", area: "cellar" },
  { id: "conservatory", name: "Conservatory", area: "conservatory" },
];
const ADJ = {
  study: ["library", "parlor", "foyer"], library: ["study", "foyer", "observatory"],
  parlor: ["study", "foyer", "cellar"], foyer: ["study", "library", "parlor", "observatory", "cellar", "conservatory"],
  observatory: ["library", "foyer", "conservatory"], cellar: ["parlor", "foyer", "conservatory"], conservatory: ["foyer", "observatory", "cellar"],
};
const CODE_CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
const PLAYER_KEY = "houseOfShadows.playerId";
const ICON_MONSTER = "\u{1F47B}", ICON_SKULL = "\u{1F480}", ICON_FOOT = "\u{1F463}", ICON_PIN = "\u{1F4CD}";

function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
function iconFor(roleId) { return (ROLES[roleId] && ROLES[roleId].icon) || "\u2753"; }
function fatherVariant(familyId) { return FATHER_VARIANTS[familyId] || FATHER_VARIANTS.default; }
function fmt(s) { const m = Math.floor(s / 60).toString().padStart(2, "0"); const sec = Math.floor(s % 60).toString().padStart(2, "0"); return m + ":" + sec; }
function genCode() { let c = ""; for (let i = 0; i < 5; i++) c += CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)]; return c; }

function makeRoster(familyId, killerId) {
  return ROLE_ORDER.map((roleId) => {
    const role = ROLES[roleId];
    if (roleId === "father") {
      const v = fatherVariant(familyId);
      return { id: "father", roleId: "father", label: "Father", fatedWith: "vigilante", secretTitle: v.secretTitle, ability: v.ability, twist: v.twist, isFated: true, revealed: false, status: "hidden", room: "foyer" };
    }
    return { id: roleId, roleId, label: role.label, secretTitle: role.secretTitle, ability: role.ability, fatedWith: role.fatedWith, isFated: role.fatedWith === killerId, revealed: false, status: "hidden", room: "foyer" };
  });
}

/* ---------------------------------------------------------
   FIREBASE HELPERS
--------------------------------------------------------- */
function roomRef(code) { return db.ref("rooms/" + code); }
async function roomExists(code) { const snap = await roomRef(code).get(); return snap.exists(); }
function transactRoom(code, fn) { return roomRef(code).transaction(fn); }
function patchRoom(code, patch) { return roomRef(code).update(patch); }
function subscribeRoom(code, cb) {
  const ref = roomRef(code);
  const handler = (snap) => cb(snap.val());
  ref.on("value", handler);
  return () => ref.off("value", handler);
}

/* ---------------------------------------------------------
   SHARED UI
--------------------------------------------------------- */
function Atmosphere({ intensity }) {
  const t = Math.max(0, Math.min(100, intensity == null ? 50 : intensity)) / 100;
  return html`<div style=${{ position: "absolute", inset: 0, pointerEvents: "none", zIndex: 0,
    background: "radial-gradient(ellipse 80% 60% at 50% 0%, rgba(217,164,65," + (0.05 + t * 0.05) + "), transparent 60%), radial-gradient(ellipse 120% 80% at 50% 100%, rgba(139,30,43," + (0.06 + t * 0.09) + "), transparent 60%)",
    animation: "flicker " + (7 - t * 3) + "s ease-in-out infinite" }}/>`;
}
function SectionLabel(props) {
  return html`<div style=${{ fontFamily: "'Cinzel', serif", fontSize: 10.5, letterSpacing: "0.18em", textTransform: "uppercase", color: "#8b8494", marginBottom: 10 }}>${props.children}</div>`;
}
function PhaseBar({ phase }) {
  const steps = [{ id: "hiding", label: "Hiding" }, { id: "hunt", label: "Hunt" }, { id: "analysis", label: "Analysis" }];
  return html`<div style=${{ display: "flex", gap: 6, marginBottom: 18 }}>
    ${steps.map((s) => { const active = s.id === phase; return html`<div key=${s.id} style=${{ flex: 1 }}>
      <div style=${{ height: 3, borderRadius: 2, background: active ? "#d9a441" : "rgba(154,161,181,0.25)", boxShadow: active ? "0 0 8px rgba(217,164,65,0.7)" : "none", transition: "all .4s ease" }}/>
      <div style=${{ fontFamily: "'Cinzel', serif", fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: active ? "#d9a441" : "#6c7284", marginTop: 6, textAlign: "center" }}>${s.label}</div>
    </div>`; })}
  </div>`;
}
function StatusPill({ status }) {
  const map = { hidden: { l: "Hiding", c: "#8b8494", b: "rgba(139,132,148,0.12)" }, caught: { l: "Found", c: "#c0293a", b: "rgba(192,41,58,0.12)" },
    escaped: { l: "Escaped", c: "#7fae6b", b: "rgba(127,174,107,0.12)" }, protected: { l: "Protected", c: "#d9a441", b: "rgba(217,164,65,0.14)" },
    monster: { l: "The Monster", c: "#c0293a", b: "rgba(192,41,58,0.18)" } };
  const s = map[status] || map.hidden;
  return html`<div style=${{ fontFamily: "'Cinzel', serif", fontSize: 9.5, letterSpacing: "0.08em", textTransform: "uppercase", color: s.c, background: s.b, padding: "4px 8px", borderRadius: 20, flexShrink: 0 }}>${s.l}</div>`;
}

/* ---------------------------------------------------------
   BOARD
--------------------------------------------------------- */
function Board({ roster, mode, onRoomTap, searchedRooms, killerRoom, killerStunned, activeRoom, reachable, familyHex, interactive }) {
  return html`<div style=${{ position: "relative" }}>
    <div style=${{ display: "grid", gridTemplateAreas: '"study study library library" "parlor foyer foyer observatory" "cellar cellar conservatory conservatory"',
      gridTemplateColumns: "1fr 1fr 1fr 1fr", gridTemplateRows: "84px 84px 84px", gap: 4, borderRadius: 10, overflow: "hidden", border: "1px solid rgba(217,164,65,0.25)", background: "#0e0c11", padding: 4 }}>
      ${ROOMS.map((room) => {
        const visibleToken = roster.find((c) => c.room === room.id && (mode === "place" || c.status === "caught" || ((c.status === "escaped" || c.status === "monster") && c._lastRoom === room.id)));
        const searched = (searchedRooms || {})[room.id];
        const isKillerHere = killerRoom === room.id && mode === "hunt";
        const isCurrent = activeRoom === room.id;
        const isReachable = reachable && reachable.includes(room.id);
        const dimmed = !isCurrent && !isReachable;
        const clickable = interactive && (mode === "hunt" ? (isReachable && !killerStunned && searched !== "found") : isReachable);
        return html`<div key=${room.id} onClick=${() => clickable && onRoomTap(room.id)} style=${{
          gridArea: room.area, position: "relative",
          background: room.hallway ? "repeating-linear-gradient(45deg,#161219,#161219 8px,#191420 8px,#191420 16px)"
            : searched === "found" ? "linear-gradient(160deg,#2c1a1e,#1a1216)" : searched === "empty" ? "linear-gradient(160deg,#1c1a22,#141119)" : "linear-gradient(160deg,#211c26,#17141a)",
          border: isCurrent ? "1.5px solid #d9a441" : isReachable ? "1px solid rgba(217,164,65,0.4)" : "1px solid rgba(154,161,181,0.1)",
          borderRadius: 6, cursor: clickable ? "pointer" : "default", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          padding: 4, transition: "all .25s", opacity: dimmed ? 0.42 : 1,
          boxShadow: isKillerHere ? "0 0 14px rgba(192,41,58,0.5) inset" : isReachable && !isCurrent ? "0 0 8px rgba(217,164,65,0.15) inset" : "none" }}>
          <div style=${{ fontFamily: "'Cinzel', serif", fontSize: 9.5, letterSpacing: "0.06em", textTransform: "uppercase", color: room.hallway ? "#4a4854" : "#9a94a8", textAlign: "center" }}>${room.name}</div>
          ${isKillerHere ? html`<span style=${{ fontSize: 15, marginTop: 4 }}>${ICON_SKULL}</span>` : null}
          ${isCurrent && mode === "place" ? html`<span style=${{ fontSize: 12, marginTop: 4 }}>${ICON_FOOT}</span>` : null}
          ${visibleToken ? html`<div style=${{ marginTop: 4, width: 16, height: 16, borderRadius: "50%", background: visibleToken.status === "monster" ? "#3a1418" : visibleToken.isFated ? "#c0293a" : familyHex, border: "1.5px solid rgba(236,223,194,0.6)", boxShadow: "0 0 6px rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9 }}>${visibleToken.status === "monster" ? ICON_MONSTER : ""}</div>` : null}
          ${searched === "empty" && !room.hallway ? html`<div style=${{ fontFamily: "'Crimson Pro', serif", fontSize: 9, color: "#4a4854", marginTop: 2, fontStyle: "italic" }}>searched</div>` : null}
        </div>`;
      })}
    </div>
    ${mode === "hunt" && killerStunned ? html`<div style=${{ position: "absolute", inset: 0, borderRadius: 10, background: "rgba(6,5,8,0.78)", display: "flex", alignItems: "center", justifyContent: "center", textAlign: "center", padding: 16 }}>
      <div style=${{ fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontSize: 13, color: "#e0a5ac" }}>A fated secret was revealed.${html`<br/>`}The killer is stunned this move.</div>
    </div>` : null}
  </div>`;
}

/* ---------------------------------------------------------
   MODALS
--------------------------------------------------------- */
function InfoCardShell({ eyebrow, character, footer, children }) {
  const icon = iconFor(character.roleId);
  return html`<div style=${{ position: "fixed", inset: 0, zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, background: "rgba(6,5,8,0.82)", backdropFilter: "blur(3px)" }}>
    <div style=${{ width: "100%", maxWidth: 360, borderRadius: 10, background: "linear-gradient(165deg, #efe3c7, #e0d2ac)", color: "#241f1a", padding: "26px 22px", border: "1px solid #b8a273", boxShadow: "0 20px 60px rgba(0,0,0,0.6)" }}>
      ${eyebrow ? html`<div style=${{ textAlign: "center", fontFamily: "'Cinzel', serif", fontSize: 11, letterSpacing: "0.2em", textTransform: "uppercase", color: "#7a1a26", marginBottom: 4 }}>${eyebrow}</div>` : null}
      <div style=${{ display: "flex", justifyContent: "center", margin: "10px 0 6px" }}><div style=${{ width: 54, height: 54, borderRadius: "50%", background: "#241f1a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>${icon}</div></div>
      <div style=${{ textAlign: "center", fontFamily: "'Cinzel', serif", fontSize: 20, marginBottom: 2 }}>${character.label}</div>
      <div style=${{ textAlign: "center", fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontSize: 14, color: "#6b5a3a", marginBottom: 14 }}>${character.secretTitle}</div>
      <p style=${{ fontFamily: "'Crimson Pro', serif", fontSize: 15, lineHeight: 1.5, textAlign: "center", marginBottom: 14 }}>${character.ability}</p>
      ${children}${footer}
    </div>
  </div>`;
}
function FatedModal({ character, killer, onClose }) {
  if (!character) return null;
  return html`<${InfoCardShell} eyebrow="Fated Encounter" character=${character}
    footer=${html`<button onClick=${onClose} style=${{ width: "100%", fontFamily: "'Cinzel', serif", fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase", padding: "12px 0", borderRadius: 4, background: "#7a1a26", border: "1px solid #7a1a26", color: "#f2e6d8", cursor: "pointer" }}>Continue</button>`}>
    <div style=${{ fontFamily: "'Crimson Pro', serif", fontSize: 12.5, textAlign: "center", color: "#6b5a3a" }}>vs ${killer.name}</div>
  <//>`;
}
function WatcherModal({ open, onClose }) {
  if (!open) return null;
  return html`<div style=${{ position: "fixed", inset: 0, zIndex: 55, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, background: "rgba(6,5,8,0.88)" }}>
    <div style=${{ textAlign: "center", maxWidth: 320 }}>
      <div style=${{ fontSize: 36, marginBottom: 16 }}>${ICON_MONSTER}</div>
      <div style=${{ fontFamily: "'Cinzel', serif", fontSize: 20, color: "#ecdfc2", marginBottom: 10 }}>The Watcher Stirs</div>
      <p style=${{ fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontSize: 14, color: "#8b8494", marginBottom: 22, lineHeight: 1.5 }}>Something else is awake in this house tonight.</p>
      <button onClick=${onClose} style=${{ fontFamily: "'Cinzel', serif", fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", padding: "12px 26px", borderRadius: 6, background: "linear-gradient(180deg,#c0293a,#7a1a26)", color: "#f2e6d8", border: "1px solid rgba(217,164,65,0.3)", cursor: "pointer" }}>Continue</button>
    </div>
  </div>`;
}
function AnalysisWheel({ roster, onSpin, spinning, canSpin }) {
  const [rotation, setRotation] = useState(0);
  const available = roster.filter((c) => c.status === "hidden");
  const doSpin = () => {
    if (spinning || available.length === 0 || !canSpin) return;
    const idx = Math.floor(Math.random() * available.length);
    const chosen = available[idx];
    const segAngle = 360 / roster.length;
    const targetIndex = roster.findIndex((r) => r.id === chosen.id);
    const finalAngle = 5 * 360 + (360 - targetIndex * segAngle - segAngle / 2);
    setRotation((p) => p + finalAngle);
    onSpin(chosen.id);
  };
  const segAngle = 360 / roster.length;
  return html`<div style=${{ display: "flex", flexDirection: "column", alignItems: "center", gap: 18 }}>
    <div style=${{ position: "relative", width: 200, height: 200 }}>
      <div style=${{ position: "absolute", top: -10, left: "50%", transform: "translateX(-50%)", width: 0, height: 0, zIndex: 3, borderLeft: "9px solid transparent", borderRight: "9px solid transparent", borderTop: "16px solid #d9a441", filter: "drop-shadow(0 0 4px rgba(217,164,65,0.6))" }}/>
      <div style=${{ width: "100%", height: "100%", borderRadius: "50%", border: "3px solid #3a3340", position: "relative", overflow: "hidden", transform: "rotate(" + rotation + "deg)", transition: spinning ? "transform 2.5s cubic-bezier(0.15,0.85,0.25,1)" : "none", boxShadow: "0 0 0 6px #17141a, 0 0 30px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.5)" }}>
        ${roster.map((c, i) => { const angle = i * segAngle; const isUsed = c.status !== "hidden";
          return html`<div key=${c.id} style=${{ position: "absolute", inset: 0, transform: "rotate(" + angle + "deg)", clipPath: "polygon(50% 50%, " + (50 + 50 * Math.tan((segAngle * Math.PI) / 360)) + "% 0%, 0% 0%)" }}>
            <div style=${{ position: "absolute", inset: 0, background: isUsed ? "linear-gradient(160deg, #201c25, #16131a)" : i % 2 === 0 ? "linear-gradient(160deg, #2c2632, #1c1721)" : "linear-gradient(160deg, #241f2a, #17131c)" }}/>
          </div>`; })}
        ${roster.map((c, i) => { const angle = i * segAngle + segAngle / 2 - 90; const r = 66;
          const x = 100 + r * Math.cos((angle * Math.PI) / 180); const y = 100 + r * Math.sin((angle * Math.PI) / 180); const isUsed = c.status !== "hidden";
          return html`<div key=${c.id + "icon"} style=${{ position: "absolute", left: x - 11, top: y - 11, fontSize: 18, opacity: isUsed ? 0.3 : 1, filter: isUsed ? "grayscale(1)" : "none" }}>${iconFor(c.roleId)}</div>`; })}
        <div style=${{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", width: 32, height: 32, borderRadius: "50%", background: "radial-gradient(circle, #d9a441, #8a5d1e)", boxShadow: "0 0 14px rgba(217,164,65,0.6)" }}/>
      </div>
    </div>
    <button onClick=${doSpin} disabled=${spinning || available.length === 0 || !canSpin} style=${{
      fontFamily: "'Cinzel', serif", letterSpacing: "0.12em", textTransform: "uppercase", fontSize: 13, padding: "12px 28px", borderRadius: 4,
      background: spinning || available.length === 0 || !canSpin ? "#2a2530" : "linear-gradient(180deg,#c0293a,#7a1a26)",
      color: spinning || available.length === 0 || !canSpin ? "#5c5866" : "#f2e6d8", border: "1px solid rgba(217,164,65,0.3)",
      cursor: spinning || available.length === 0 || !canSpin ? "default" : "pointer", transition: "all .2s" }}>
      ${available.length === 0 ? "All secrets settled" : spinning ? "Turning\u2026" : canSpin ? "Turn the Wheel" : "Waiting for a family player"}
    </button>
  </div>`;
}
function SecretModal({ character, killer, onReveal, onSilence, mine }) {
  if (!character) return null;
  const revealLabel = character.twist === "protection" ? "Reveal for Protection" : "Reveal Secret";

      </div>` : html`<div style=${{ textAlign: "center", fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontSize: 12.5, color: "#6b5a3a" }}>Waiting for ${character.label}'s player to decide\u2026</div>`}>

  <//>`;
}

function Lobby({ code, playerId, name, onStart, onLeave }) {
  const [room, setRoom] = useState(null);
  const [copied, setCopied] = useState(false);
  const [killerPick, setKillerPick] = useState(null);
  const [timedOut, setTimedOut] = useState(false);

  useEffect(() => subscribeRoom(code, setRoom), [code]);
  useEffect(() => { const t = setTimeout(() => { if (!room) setTimedOut(true); }, 6000); return () => clearTimeout(t); }, [room]);

  const isHost = room && room.hostId === playerId;
  const players = (room && room.players) || {};

  function claimSlot(slot) {
    transactRoom(code, (r) => {
      if (!r) return r;
      const players2 = Object.assign({}, r.players || {});
      const takenByOther = Object.entries(players2).some(([pid, p]) => pid !== playerId && p.slot === slot);
      if (takenByOther) return;
      Object.keys(players2).forEach((pid) => { if (pid === playerId) delete players2[pid]; });
      players2[playerId] = { name: name, slot: slot, killerId: slot === "killer" ? killerPick : null };
      r.players = players2;
      return r;
    });
  }
  function confirmKiller(kid) {
    setKillerPick(kid);
    transactRoom(code, (r) => {
      if (!r) return r;
      const players2 = Object.assign({}, r.players || {});
      Object.keys(players2).forEach((pid) => { if (pid === playerId) delete players2[pid]; });
      const takenByOther = Object.values(players2).some((p) => p.slot === "killer");
      if (takenByOther) return;
      players2[playerId] = { name: name, slot: "killer", killerId: kid };
      r.players = players2;
      r.setup = Object.assign({}, r.setup || {}, { killerId: kid });
      return r;

  function updateSetup(patch) { patchRoom(code, { setup: Object.assign({}, (room && room.setup) || {}, patch) }); }

    await roomRef(code).update({

    ${timedOut ? html`<div style=${{ color: "#c0293a" }}>Still waiting on Firebase after 6 seconds.${html`<br/>`}This usually means the database rules aren't published yet, or the databaseURL in the config doesn't match your database's region.${html`<br/>`}Room code: ${code}</div>` : "Opening the house\u2026"}

  const setup = room.setup || {};

      <button onClick=${copyCode} style=${{ display: "flex", alignItems: "center", gap: 8, background: "#161219", border: "1px solid rgba(217,164,65,0.3)", borderRadius: 8, padding: "8px 14px", cursor: "pointer" }}>
        <span style=${{ fontFamily: "'JetBrains Mono', monospace", fontSize: 16, letterSpacing: "0.2em", color: "#d9a441" }}>${code}</span>
      </button>
    </div>
    <button onClick=${copyLink} style=${{ display: "block", margin: "0 auto 10px", background: "transparent", border: "none", color: "#565162", fontFamily: "'Crimson Pro', serif", fontSize: 11, textDecoration: "underline", cursor: "pointer" }}>copy shareable link</button>
    ${copied ? html`<div style=${{ textAlign: "center", fontFamily: "'Crimson Pro', serif", fontSize: 11, color: "#7fae6b", marginBottom: 10 }}>Copied!</div>` : null}

    ${isHost ? html`<div style=${{ marginBottom: 24 }}>

      <div style=${{ marginBottom: 10 }}>
        <div style=${{ fontFamily: "'Crimson Pro', serif", fontSize: 11.5, color: "#6c7284", marginBottom: 6 }}>House</div>

          </button>`)}
        </div>
      </div>
      <div style=${{ display: "flex", gap: 8, marginBottom: 10 }}>
        ${Object.entries(TIMER_PRESETS).map(([k, p]) => html`<button key=${k} onClick=${() => updateSetup({ preset: k })} style=${{ flex: 1, padding: "7px 0", borderRadius: 6, cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 10.5,
          background: setup.preset === k ? "#241f2a" : "transparent", border: setup.preset === k ? "1px solid #d9a441" : "1px solid rgba(154,161,181,0.2)", color: setup.preset === k ? "#d9a441" : "#8b8494" }}>${p.label}</button>`)}

          background: setup.watcherPresence === k ? "#241f2a" : "transparent", border: setup.watcherPresence === k ? "1px solid #d9a441" : "1px solid rgba(154,161,181,0.2)", color: setup.watcherPresence === k ? "#d9a441" : "#8b8494" }}>Watcher: ${w.label}</button>`)}

    <${SectionLabel}>Seats<//>

/* ---------------------------------------------------------
   GAME
--------------------------------------------------------- */
function Game({ code, playerId, name, onLeave }) {
  const [room, setRoom] = useState(null);
  const hostTickRef = useRef(null);

  useEffect(() => subscribeRoom(code, setRoom), [code]);

  const isHost = room && room.hostId === playerId;
  const setup = (room && room.setup) || {};
  const killer = KILLERS.find((k) => k.id === setup.killerId) || KILLERS[0];
  const family = FAMILIES.find((f) => f.id === setup.familyId) || FAMILIES[0];
  const horrorIntensity = setup.horrorIntensity == null ? 50 : setup.horrorIntensity;
  const watcherRate = WATCHER_PRESETS[setup.watcherPresence || "off"].perSecond;
  const mySlot = room && Object.entries(room.players || {}).find(([pid]) => pid === playerId);
  const mySlotName = mySlot ? mySlot[1].slot : null;

  function advancePhase(state) {
    const d = TIMER_PRESETS[(state.setup && state.setup.preset) || "standard"];
    if (state.phase === "hiding") return Object.assign({}, state, { phase: "hunt", timeLeft: d.hunt, running: false, passState: "killer", log: ["Hiding ends. The killer steps out of the foyer."].concat(state.log || []).slice(0, 8) });
    if (state.phase === "hunt") return Object.assign({}, state, { phase: "analysis", timeLeft: d.analysis, running: false, passState: "analysis", log: ["The hunt stalls. The Analysis Wheel turns."].concat(state.log || []).slice(0, 8) });
    const roster = state.roster.map((c) => (c.status === "hidden" || c.status === "protected") ? Object.assign({}, c, { status: "hidden", room: "foyer" }) : c);
    const activeHunted = roster.filter((c) => c.status === "hidden" || c.status === "protected");
    if (activeHunted.length === 0) return Object.assign({}, state, { phase: "gameover", running: false, roster: roster });
    return Object.assign({}, state, { phase: "hiding", round: state.round + 1, timeLeft: d.hiding, searchedRooms: {}, killerRoom: "foyer", killerStunned: false, watcherFiredThisHunt: false, roster: roster,
      log: ["Round " + (state.round + 1) + " begins. Remaining family return to the foyer."].concat(state.log || []).slice(0, 8) });
  }

  useEffect(() => {
    if (!isHost || !room || room.phase === "gameover") return;
    if (hostTickRef.current) return;
    hostTickRef.current = setInterval(async () => {
      const snap = await roomRef(code).get(); const fresh = snap.val(); if (!fresh || !fresh.running) return;
      let next = Object.assign({}, fresh);
      if (fresh.phase === "hunt" && watcherRate > 0 && !fresh.watcherFiredThisHunt && Math.random() < watcherRate) {
        next.watcherFiredThisHunt = true; next.watcherModal = true;
        next.log = ["The Watcher stirs somewhere in the house."].concat(fresh.log || []).slice(0, 8);
        if (fresh.setup && fresh.setup.familyId === "white") {
          next.roster = fresh.roster.map((c) => (c.id === "father" && c.status === "hidden") ? Object.assign({}, c, { status: "monster", _lastRoom: c.room }) : c);
        }
      }
      if (next.timeLeft > 1) next.timeLeft = next.timeLeft - 1; else next = advancePhase(next);
      await roomRef(code).set(next);
    }, 1000);
    return () => { clearInterval(hostTickRef.current); hostTickRef.current = null; };
  }, [isHost, room && room.phase, room && room.running, code]);

  if (!room) return html`<div style=${{ padding: 40, textAlign: "center", fontFamily: "'Crimson Pro', serif", color: "#8b8494" }}>Entering the house\u2026</div>`;

  const roster = room.roster || [];
  const remaining = roster.filter((c) => c.status === "hidden");

  if (room.phase === "gameover") {
    const survivors = roster.filter((c) => c.status === "escaped" || c.status === "monster").length;
    return html`<div style=${{ position: "relative", zIndex: 1, padding: "60px 24px", textAlign: "center" }}>
      <div style=${{ fontSize: 40, marginBottom: 16 }}>${ICON_SKULL}</div>
      <h2 style=${{ fontFamily: "'Cinzel', serif", fontSize: 24, color: "#ecdfc2" }}>The House Falls Silent</h2>
      <p style=${{ fontFamily: "'Crimson Pro', serif", fontSize: 15, color: "#8b8494", margin: "12px 0 28px" }}>${survivors} of 5 family members escaped ${killer.name}.</p>
      <button onClick=${onLeave} style=${{ fontFamily: "'Cinzel', serif", fontSize: 13, letterSpacing: "0.1em", textTransform: "uppercase", padding: "13px 30px", borderRadius: 6, background: "linear-gradient(180deg,#c0293a,#7a1a26)", color: "#f2e6d8", border: "1px solid rgba(217,164,65,0.3)", cursor: "pointer" }}>Leave the House</button>
    </div>`;
  }

  const familyHex = family.hex;
  const activeChar = mySlotName && mySlotName !== "killer" ? roster.find((c) => c.id === mySlotName) : null;
  const placeReachable = activeChar ? ADJ[activeChar.room] : [];
  const huntReachable = ADJ[room.killerRoom];
  const myIsKiller = mySlotName === "killer";
  const iOwnHidden = mySlotName && mySlotName !== "killer" && roster.find((c) => c.id === mySlotName) && roster.find((c) => c.id === mySlotName).status === "hidden";

  function handleRoomTapPlace(roomId) {
    if (!activeChar || activeChar.status !== "hidden") return;
    if (!ADJ[activeChar.room].includes(roomId)) return;
    transactRoom(code, (fresh) => {
      if (!fresh) return fresh;
      const occ = fresh.roster.filter((c) => c.status === "hidden" && c.room !== "foyer" && c.id !== activeChar.id).map((c) => c.room);
      if (occ.includes(roomId)) return;
      const cur = fresh.roster.find((c) => c.id === activeChar.id);
      if (!cur || !ADJ[cur.room].includes(roomId)) return;
      fresh.roster = fresh.roster.map((c) => c.id === activeChar.id ? Object.assign({}, c, { room: roomId }) : c);
      return fresh;
    });
  }

  function handleRoomTapHunt(roomId) {
    if (!myIsKiller) return;
    transactRoom(code, (fresh) => {
      if (!fresh || fresh.killerStunned) return;
      if (!ADJ[fresh.killerRoom].includes(roomId)) return;
      const occupant = fresh.roster.find((c) => c.room === roomId && c.status === "hidden");
      const roomName = ROOMS.find((r) => r.id === roomId).name;
      if (!occupant) {
        fresh.killerRoom = roomId; fresh.searchedRooms = Object.assign({}, fresh.searchedRooms || {}, { [roomId]: "empty" });
        fresh.log = [killer.name + " moves into the " + roomName + " \u2014 nothing there."].concat(fresh.log || []).slice(0, 8);
        return fresh;
      }
      if (occupant.isFated) {
        fresh.roster = fresh.roster.map((c) => c.id === occupant.id ? Object.assign({}, c, { status: "escaped", _lastRoom: roomId }) : c);
        const relocate = occupant.id === "son";
        fresh.killerRoom = relocate ? "foyer" : roomId;
        fresh.killerStunned = true; fresh.fatedResult = occupant; fresh._stunUntil = Date.now() + 3200;
        fresh.searchedRooms = Object.assign({}, fresh.searchedRooms || {}, { [roomId]: "found" });
        fresh.log = [killer.name + " finds " + occupant.label + " \u2014 the fated secret triggers" + (relocate ? " and he's relocated to the Foyer" : "") + "."].concat(fresh.log || []).slice(0, 8);
        return fresh;
      }
      fresh.roster = fresh.roster.map((c) => c.id === occupant.id ? Object.assign({}, c, { status: "caught", _lastRoom: roomId }) : c);
      fresh.killerRoom = roomId; fresh.searchedRooms = Object.assign({}, fresh.searchedRooms || {}, { [roomId]: "found" });
      fresh.log = [killer.name + " finds " + occupant.label + ". Their secret dies with them."].concat(fresh.log || []).slice(0, 8);
      return fresh;
    });
  }

  useEffect(() => {
    if (!room.killerStunned || !room._stunUntil) return;
    const ms = room._stunUntil - Date.now();
    if (ms <= 0) return;
    const t = setTimeout(() => { patchRoom(code, { killerStunned: false, fatedResult: null }); }, ms + 200);
    return () => clearTimeout(t);
  }, [room._stunUntil]);

  function handleSpin(chosenId) {
    if (!iOwnHidden) return;
    patchRoom(code, { wheel: { spinning: true, resultId: chosenId } });
    setTimeout(() => { patchRoom(code, { wheel: { spinning: false, resultId: chosenId } }); }, 2600);
  }
  const wheelChar = room.wheel && room.wheel.resultId && !room.wheel.spinning ? roster.find((c) => c.id === room.wheel.resultId) : null;
  const wheelCharIsMine = wheelChar && mySlotName === wheelChar.id;

  function revealSecret() {
    transactRoom(code, (fresh) => {
      if (!fresh || !fresh.wheel) return;
      const wc = fresh.roster.find((c) => c.id === fresh.wheel.resultId);
      if (!wc) return;
      const isProtection = wc.twist === "protection";
      fresh.roster = fresh.roster.map((c) => c.id === wc.id ? Object.assign({}, c, { revealed: true, status: isProtection ? "protected" : "escaped", _lastRoom: c.room }) : c);
      fresh.wheel = { spinning: false, resultId: null };
      fresh.log = [(isProtection ? (wc.label + " reveals their secret and gains Protection until next round.") : (wc.label + " reveals their secret: " + wc.secretTitle + "."))].concat(fresh.log || []).slice(0, 8);
      return fresh;
    });
  }
  function silence() {
    transactRoom(code, (fresh) => {
      if (!fresh || !fresh.wheel) return;
      const wc = fresh.roster.find((c) => c.id === fresh.wheel.resultId);
      fresh.wheel = { spinning: false, resultId: null };
      fresh.log = [((wc ? wc.label : "A family member") + " chooses to stay silent.")].concat(fresh.log || []).slice(0, 8);
      return fresh;
    });
  }

  function togglePause() { if (!isHost) return; patchRoom(code, { running: !room.running }); }
  function skip() { if (!isHost) return; transactRoom(code, (fresh) => fresh ? advancePhase(fresh) : fresh); }
  function dismissPass() { if (!isHost) return; patchRoom(code, { passState: null, running: true }); }
  function dismissWatcher() { patchRoom(code, { watcherModal: false }); }

  return html`<div style=${{ position: "relative", zIndex: 1, padding: "22px 18px 40px" }}>
    ${room.passState && mySlotName === room.passState ? html`<div style=${{ position: "fixed", inset: 0, zIndex: 60, display: "flex", alignItems: "center", justifyContent: "center", padding: 24, background: "#0b0a0d" }}>
      <div style=${{ textAlign: "center", maxWidth: 320 }}>
        <div style=${{ fontSize: 34, marginBottom: 18 }}>${ICON_MONSTER}</div>
        <div style=${{ fontFamily: "'Cinzel', serif", fontSize: 20, color: "#ecdfc2", marginBottom: 10 }}>Your Turn</div>
        <p style=${{ fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontSize: 14, color: "#8b8494", marginBottom: 26 }}>${room.passState === "killer" ? "The hunt begins." : "Time to spin the Analysis Wheel."}</p>
        <button onClick=${dismissPass} disabled=${!isHost} style=${{ fontFamily: "'Cinzel', serif", fontSize: 13, letterSpacing: "0.1em", textTransform: "uppercase", padding: "13px 28px", borderRadius: 6, background: "linear-gradient(180deg,#c0293a,#7a1a26)", color: "#f2e6d8", border: "1px solid rgba(217,164,65,0.3)", cursor: isHost ? "pointer" : "default", opacity: isHost ? 1 : 0.5 }}>${isHost ? "Begin" : "Waiting for host\u2026"}</button>
      </div>
    </div>` : null}
    ${room.passState && mySlotName !== room.passState && !isHost ? html`<div style=${{ position: "fixed", inset: 0, zIndex: 60, display: "flex", alignItems: "center", justifyContent: "center", padding: 24, background: "#0b0a0d" }}>
      <div style=${{ textAlign: "center", fontFamily: "'Crimson Pro', serif", fontStyle: "italic", color: "#8b8494" }}>Waiting for the next phase to begin\u2026</div>
    </div>` : null}
    <${SecretModal} character=${wheelChar} killer=${killer} onReveal=${revealSecret} onSilence=${silence} mine=${wheelCharIsMine}/>
    <${FatedModal} character=${room.fatedResult} killer=${killer} onClose=${() => patchRoom(code, { fatedResult: null })}/>
    <${WatcherModal} open=${!!room.watcherModal} onClose=${dismissWatcher}/>

    <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
      <button onClick=${onLeave} style=${{ background: "transparent", border: "none", color: "#6c7284", fontFamily: "'Crimson Pro', serif", fontSize: 11.5, cursor: "pointer" }}>\u2190 Leave</button>
      <div style=${{ fontFamily: "'Cinzel', serif", fontSize: 11, letterSpacing: "0.15em", color: "#8b8494" }}>ROUND ${room.round}</div>
      <span></span>
    </div>
    <div style=${{ textAlign: "center", marginBottom: 4 }}>
      <div style=${{ fontFamily: "'Crimson Pro', serif", fontSize: 12, fontStyle: "italic", color: "#c0293a" }}>${killer.name}</div>
      <div style=${{ fontFamily: "'Crimson Pro', serif", fontSize: 10.5, color: "#565162" }}>You are ${myIsKiller ? "the killer" : mySlotName ? ROLES[mySlotName].label : "spectating"}${name ? " — " + name : ""}</div>
    </div>

    <${PhaseBar} phase=${room.phase}/>

    <div style=${{ textAlign: "center", margin: "14px 0 20px" }}>
      <div style=${{ fontFamily: "'JetBrains Mono', monospace", fontSize: 48, color: "#ecdfc2", letterSpacing: "0.02em", textShadow: "0 0 20px rgba(217,164,65,0.25)" }}>${fmt(room.timeLeft)}</div>
      <div style=${{ fontFamily: "'Crimson Pro', serif", fontSize: 13, color: "#6c7284", fontStyle: "italic", marginTop: 2 }}>
        ${room.phase === "hiding" ? (activeChar ? "Step room to room — only doorways glow." : "Family members are hiding.") : null}
        ${room.phase === "hunt" ? (myIsKiller ? "Step into a glowing, adjacent room." : "The killer is on the move.") : null}
        ${room.phase === "analysis" ? "The wheel decides who speaks next." : null}
      </div>
    </div>

    ${isHost ? html`<div style=${{ display: "flex", gap: 10, justifyContent: "center", marginBottom: 20 }}>
      <button onClick=${togglePause} style=${iconBtnStyle}>${room.running ? "\u23F8" : "\u25B6"} ${room.running ? "Pause" : "Resume"}</button>
      <button onClick=${skip} style=${iconBtnStyle}>\u25B8 Skip</button>
    </div>` : null}

    ${room.phase === "hiding" ? html`<div style=${{ marginBottom: 22 }}>
      <${SectionLabel}>${activeChar ? "Your route" : "The mansion"}<//>
      <${Board} roster=${roster} mode="place" onRoomTap=${handleRoomTapPlace} searchedRooms=${{}} killerRoom=${null} killerStunned=${false} activeRoom=${activeChar && activeChar.room} reachable=${placeReachable} familyHex=${familyHex} interactive=${!!activeChar && activeChar.status === "hidden"}/>
    </div>` : null}
    ${room.phase === "hunt" ? html`<div style=${{ marginBottom: 22 }}>
      <${SectionLabel}>The mansion<//>
      <${Board} roster=${roster} mode="hunt" onRoomTap=${handleRoomTapHunt} searchedRooms=${room.searchedRooms} killerRoom=${room.killerRoom} killerStunned=${room.killerStunned} activeRoom=${room.killerRoom} reachable=${huntReachable} familyHex=${familyHex} interactive=${myIsKiller}/>
    </div>` : null}
    ${room.phase === "analysis" ? html`<div style=${{ marginBottom: 8 }}>
      <${SectionLabel}>Analysis wheel<//>
      <${AnalysisWheel} roster=${remaining.length ? remaining : roster} onSpin=${handleSpin} spinning=${!!(room.wheel && room.wheel.spinning)} canSpin=${iOwnHidden && !(room.wheel && room.wheel.resultId)}/>
    </div>` : null}

    <${SectionLabel}>The family<//>
    <div style=${{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 24 }}>
      ${roster.map((c) => {
        const owner = Object.values(room.players || {}).find((p) => p.slot === c.id);
        return html`<div key=${c.id} style=${{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", borderRadius: 8, background: "#161219", border: c.isFated ? "1px solid rgba(192,41,58,0.4)" : "1px solid rgba(154,161,181,0.1)", opacity: c.status === "caught" ? 0.4 : 1 }}>
          <div style=${{ width: 34, height: 34, borderRadius: "50%", flexShrink: 0, background: c.status === "monster" ? "#3a1418" : c.isFated ? "#3a1418" : "#221e28", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>${c.status === "monster" ? ICON_MONSTER : iconFor(c.roleId)}</div>
          <div style=${{ flex: 1 }}>
            <div style=${{ fontFamily: "'Cinzel', serif", fontSize: 12.5, color: "#ecdfc2" }}>${c.label}${owner ? " — " + owner.name : ""}</div>
            <div style=${{ fontFamily: "'Crimson Pro', serif", fontSize: 11, color: "#6c7284", display: "flex", alignItems: "center", gap: 4 }}>
              ${c.revealed ? c.secretTitle : "Secret unknown"}
              ${c.status === "hidden" && c.room !== "foyer" ? html`<span>${ICON_PIN} ${(ROOMS.find((r) => r.id === c.room) || {}).name}</span>` : null}
            </div>
          </div>
          <${StatusPill} status=${c.status}/>
        </div>`;
      })}
    </div>

    <${SectionLabel}>Log<//>
    <div style=${{ display: "flex", flexDirection: "column", gap: 6 }}>
      ${(room.log || []).map((entry, i) => html`<div key=${i} style=${{ fontFamily: "'Crimson Pro', serif", fontSize: 12, fontStyle: "italic", color: i === 0 ? "#c9c3d4" : "#565162" }}>${entry}</div>`)}
    </div>
  </div>`;
}

const iconBtnStyle = { display: "flex", alignItems: "center", gap: 6, padding: "9px 16px", borderRadius: 20, background: "#181419", border: "1px solid rgba(154,161,181,0.2)", color: "#c9c3d4", fontFamily: "'Crimson Pro', serif", fontSize: 12, cursor: "pointer" };

/* ---------------------------------------------------------
   ROOT
--------------------------------------------------------- */
function App() {
  const [screen, setScreen] = useState("landing");
  const [code, setCode] = useState(null);
  const [playerId, setPlayerId] = useState(null);
  const [name, setName] = useState("");

  useEffect(() => {
    let id = lsGet(PLAYER_KEY);
    if (!id) { id = "p-" + Math.random().toString(36).slice(2, 10); lsSet(PLAYER_KEY, id); }
    setPlayerId(id);
    const params = new URLSearchParams(location.search);
    const roomParam = params.get("room");
    if (roomParam) setCode(roomParam.toUpperCase());
  }, []);

  async function createRoom() {
    if (!playerId) return;
    const newCode = genCode();
    await roomRef(newCode).set({
      code: newCode, hostId: playerId, phase: "lobby",
      setup: { killerId: null, familyId: null, preset: "standard", watcherPresence: "rare", horrorIntensity: 50 },
      players: {}, round: 1,
    });
    setCode(newCode); setScreen("lobby");
  }
  async function joinRoom(joinCode) {
    if (!playerId) return false;
    const exists = await roomExists(joinCode);
    if (!exists) return false;
    const snap = await roomRef(joinCode).get(); const r = snap.val();
    setCode(joinCode); setScreen(r && r.phase === "lobby" ? "lobby" : "game");
    return true;
  }
  function leave() { setScreen("landing"); setCode(null); }

  useEffect(() => {
    if (code && screen === "landing" && playerId && name.trim()) joinRoom(code);
  }, [code, playerId]);

  return html`<div style=${{ minHeight: "100vh", width: "100%", position: "relative", background: "radial-gradient(ellipse at 50% -10%, #1c1620 0%, #0b0a0d 55%)", color: "#c9c3d4", overflow: "hidden" }}>
    <${Atmosphere} intensity=${50}/>
    <div style=${{ maxWidth: 420, margin: "0 auto", position: "relative" }}>
      ${screen === "landing" ? html`<${Landing} onCreate=${createRoom} onJoin=${joinRoom} name=${name} setName=${setName}/>` : null}
      ${screen === "lobby" && code ? html`<${Lobby} code=${code} playerId=${playerId} name=${name} onStart=${() => setScreen("game")} onLeave=${leave}/>` : null}
      ${screen === "game" && code ? html`<${Game} code=${code} playerId=${playerId} name=${name} onLeave=${leave}/>` : null}
    </div>
  </div>`;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(html`<${App}/>`);
</script>
